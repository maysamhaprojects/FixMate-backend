server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fixmate?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: FixMateSuperSecretKey_ChangeMe_123456789012345678901234
    expiration-ms: 86400000
