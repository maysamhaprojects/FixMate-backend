# ============================================================
#  קובץ תצורה לדוגמה — אינו מכיל סודות אמיתיים.
#  התצורה הפעילה נמצאת ב-application.properties, שאינו נכלל ב-git.
#  להרצה מקומית: צרו application.properties ומלאו את הערכים שלכם.
# ============================================================

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fixmate_db?useSSL=false&serverTimezone=Asia/Jerusalem&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    # הערך האמיתי מוגדר ב-application.properties המקומי
    secret: ${JWT_SECRET:}
    expiration-ms: 86400000
